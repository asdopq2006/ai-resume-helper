<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 简历分析助手</title>
  <style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
    }
    textarea {
        width: 100%;
        height: 200px;
        padding: 10px;
        font-size: 14px;
        font-family: monospace;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    button {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
    }
    button:hover {
        background-color: #45a049;
    }
    .result {
        margin-top: 20px;
        padding: 15px;
        background-color: #f9f9f9;
        border-left: 4px solid #4CAF50;
        border-radius: 4px;
        white-space: pre-wrap;
        word-wrap: break-word;
    }
    .error {
        border-left-color: #f44336;
        background-color: #ffefef;
    }
    label {
        font-weight: bold;
    }
    .file-upload {
        margin: 20px 0;
    }
  </style>
</head>
<body>
<h1>📄 AI 简历分析助手</h1>
<p>粘贴简历文本或上传文件（.txt, .pdf, .docx），AI 将自动提取技能列表和工作年限。</p>

<div class="file-upload">
  <label>📁 上传文件（可选）：</label><br>
  <input type="file" id="fileInput" accept=".txt,.pdf,.docx">
  <button id="uploadBtn">上传并分析</button>
</div>

<hr>

<div>
  <label>✍️ 或直接粘贴简历文本：</label><br>
  <textarea id="resumeText" placeholder="例如：精通 Java、Spring Boot，有5年后端开发经验..."></textarea>
  <button id="analyzeBtn">分析文本</button>
</div>

<div id="result" class="result" style="display:none;"></div>
<hr>
<h3>📜 历史分析记录</h3>
<div id="historyContainer" style="max-height: 400px; overflow-y: auto;"></div>

<script>
  const analyzeBtn = document.getElementById('analyzeBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  const resumeText = document.getElementById('resumeText');
  const resultDiv = document.getElementById('result');

  function showResult(data, isError = false) {
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '';
      if (isError) {
          resultDiv.classList.add('error');
          resultDiv.innerHTML = `<strong>❌ 错误：</strong> ${data.error || data}`;
      } else {
          resultDiv.classList.remove('error');
          let html = `<strong>✅ 分析结果：</strong><br>`;
          if (data.skills) html += `<strong>技能：</strong> ${data.skills.join(', ')}<br>`;
          if (data.yearsOfExperience !== undefined) html += `<strong>工作年限：</strong> ${data.yearsOfExperience} 年<br>`;
          if (data.error) html += `<strong>注意：</strong> ${data.error}`;
          resultDiv.innerHTML = html;
      }
  }

  // 加载历史记录
  async function loadHistory() {
      try {
          const response = await fetch('/ai/history');
          const data = await response.json();
          const container = document.getElementById('historyContainer');
          container.innerHTML = '';
          if (!data || data.length === 0) {
              container.innerHTML = '<p>暂无历史记录</p>';
              return;
          }
          data.forEach(item => {
              const card = document.createElement('div');
              card.className = 'history-card';
              card.innerHTML = `
                  <div><strong>时间：</strong> ${item.createTime}</div>
                  <div><strong>技能：</strong> ${item.skills || '无'}</div>
                  <div><strong>年限：</strong> ${item.yearsOfExperience ?? '无'}</div>
                  <div><strong>学历：</strong> ${item.education || '无'}</div>
                  <div><strong>期望职位：</strong> ${item.expectedPosition || '无'}</div>
                  <div><strong>简历原文：</strong> ${item.resumeText?.substring(0, 80) || ''}${item.resumeText?.length > 80 ? '…' : ''}</div>
                  <button onclick="deleteHistory(${item.id})">删除</button>
              `;
              container.appendChild(card);
          });
      } catch (err) {
          console.error('加载历史记录失败:', err);
      }
  }

  // 删除单条记录
  async function deleteHistory(id) {
      try {
          await fetch(`/ai/history/${id}`, { method: 'DELETE' });
          loadHistory();
      } catch (err) {
          console.error('删除失败:', err);
      }
  }

  // 分析文本接口
  analyzeBtn.addEventListener('click', async () => {
      const text = resumeText.value.trim();
      if (!text) {
          showResult({ error: '请填写简历文本' }, true);
          return;
      }
      try {
          const response = await fetch('/ai/analyze-resume', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(text)
          });
          const data = await response.json();
          if (response.ok) {
              showResult(data);
          } else {
              showResult({ error: data.error || '服务器错误' }, true);
          }
      } catch (err) {
          showResult({ error: '网络错误：' + err.message }, true);
      }
  });

  // 上传文件接口
  uploadBtn.addEventListener('click', async () => {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) {
          showResult({ error: '请先选择文件' }, true);
          return;
      }
      const formData = new FormData();
      formData.append('file', file);
      try {
          const response = await fetch('/ai/analyze-resume-file', {
              method: 'POST',
              body: formData
          });
          const data = await response.json();
          if (response.ok) {
              showResult(data);
          } else {
              showResult({ error: data.error || '服务器错误' }, true);
          }
      } catch (err) {
          showResult({ error: '网络错误：' + err.message }, true);
      }
  });
   // 页面加载时获取历史记录
  window.addEventListener('DOMContentLoaded', () => {
      loadHistory();
  });
</script>
</body>
</html>
